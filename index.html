<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roxxon News Feed</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:#fff;
  background: url("https://images.pexels.com/photos/4173311/pexels-photo-4173311.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=750&w=1260") center/cover fixed;
  background-size: cover;
}
header { background-color: rgba(0,0,0,0.6); text-align:center; padding:20px; font-size:28px; font-weight:bold; color:#FF004F; }
section { background-color: rgba(0,0,0,0.6); padding:20px; margin:10px; border-radius:12px; }
h2 { color:#00FFD1; }
input, textarea { width:100%; padding:10px; margin-top:5px; border-radius:5px; border:none; }
button { background-color:#FFB400; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold; margin-top:5px; }
.post, .comment, .weather-item, .podcast-item, .news-item { background: rgba(30,30,30,0.85); padding:10px; margin:10px 0; border-radius:10px; }
.post-header { font-weight:bold; }
.verified { color:#1DA1F2; margin-left:5px; }
#podcast-player iframe { border-radius:12px; width:100%; height:300px; }
</style>
</head>
<body>

<header>Roxxon News Feed</header>

<!-- Auth Section -->
<section id="auth">
  <h2>User Authentication</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <div id="auth-status"></div>
</section>

<!-- Weather Section -->
<section id="weather">
  <h2>Weather Across USA 🌎</h2>
  <div id="weather-list">Loading weather…</div>
</section>

<!-- Social Feed -->
<section id="social-feed">
  <h2>Social Feed</h2>
  <input id="post-text" placeholder="Write a post...">
  <button onclick="addPost()">Post</button>
  <div id="posts"></div>
</section>

<!-- Podcasts -->
<section id="podcasts">
  <h2>Podcasts</h2>
  <div id="podcast-list">
    <div class="podcast-item" onclick="openPodcast('https://www.youtube.com/c/joerogan')">Joe Rogan</div>
    <div class="podcast-item" onclick="openPodcast('https://www.youtube.com/@WhyFiles')">Why Files</div>
    <div class="podcast-item" onclick="openPodcast('https://www.youtube.com/@WHYY')">WHYY</div>
    <div class="podcast-item" onclick="openPodcast('https://www.youtube.com/@B1011')">B101.1</div>
  </div>
  <div id="podcast-player"></div>
</section>

<!-- Firebase + JS -->
<script>
  // ----- Firebase Config -----
  const firebaseConfig = {
    apiKey: "YOUR_FIREBASE_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ----- Auth -----
  auth.onAuthStateChanged(user=>{
    const status = document.getElementById('auth-status');
    if(user){ status.innerText = `Logged in as ${user.email} (${user.emailVerified?'Verified':'Not Verified'})`; }
    else{ status.innerText = 'Not logged in'; }
  });

  function signup(){
    const email=document.getElementById('email').value;
    const password=document.getElementById('password').value;
    auth.createUserWithEmailAndPassword(email,password)
    .then(userCredential=>{ userCredential.user.sendEmailVerification(); alert("Check email to verify!"); })
    .catch(err=>alert(err.message));
  }

  function login(){
    const email=document.getElementById('email').value;
    const password=document.getElementById('password').value;
    auth.signInWithEmailAndPassword(email,password)
    .catch(err=>alert(err.message));
  }

  function logout(){ auth.signOut(); }

  // ----- Social Feed -----
  function addPost(){
    const text=document.getElementById('post-text').value.trim();
    const user=auth.currentUser;
    if(!user || !user.emailVerified){ alert("You must be logged in and verified!"); return; }
    if(!text) return;
    db.collection('posts').add({
      text: text,
      user: user.email,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('post-text').value='';
  }

  // Load posts
  db.collection('posts').orderBy('timestamp','desc').onSnapshot(snapshot=>{
    const container=document.getElementById('posts');
    container.innerHTML='';
    snapshot.forEach(doc=>{
      const p=doc.data();
      const div=document.createElement('div');
      div.className='post';
      div.innerHTML=`<div class="post-header">${p.user}</div><p>${p.text}</p>`;
      container.appendChild(div);
    });
  });

  // ----- Weather -----
  const cities = ["New York","Los Angeles","Chicago","Houston","Phoenix","Philadelphia","San Antonio","San Diego","Dallas","San Jose"];
  async function loadWeather(){
    const apiKey="YOUR_OPENWEATHERMAP_API_KEY";
    const container=document.getElementById('weather-list');
    container.innerHTML='';
    for(const city of cities){
      try{
        const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city},US&units=imperial&appid=${apiKey}`);
        const data=await res.json();
        container.innerHTML+=`<div class="weather-item">${city}: ${Math.round(data.main.temp)}°F, ${data.weather[0].description}</div>`;
      }catch(e){ container.innerHTML+=`<div class="weather-item">${city}: Unable to load</div>`; }
    }
  }
  loadWeather();

  // ----- Podcasts -----
  function openPodcast(url){ window.open(url,'_blank'); }
</script>

</body>
</html>
